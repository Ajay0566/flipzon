<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flipzon{% endblock %}</title>
    <style>
        :root {
            --bg: #fffaf2;
            --surface: #ffffff;
            --surface-alt: #fff2d8;
            --text: #1f2937;
            --muted: #6b7280;
            --brand: #d97706;
            --brand-dark: #9a3412;
            --line: #f3dfb6;
            --success: #15803d;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, #ffe6b3 0, transparent 28%),
                linear-gradient(180deg, #fff7ea 0%, var(--bg) 100%);
        }
        a { color: inherit; text-decoration: none; }
        .container { width: min(1120px, calc(100% - 2rem)); margin: 0 auto; }
        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(12px);
            background: rgba(255, 250, 242, 0.9);
            border-bottom: 1px solid var(--line);
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 0;
        }
        .brand {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--brand-dark);
        }
        .nav {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav a {
            padding: 0.65rem 1rem;
            border-radius: 999px;
        }
        .nav a:hover { background: var(--surface-alt); }
        .search-form {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .search-form input,
        .search-form button,
        .search-form select {
            font: inherit;
            padding: 0.8rem 1rem;
            border-radius: 999px;
            border: 1px solid var(--line);
        }
        .search-form input { min-width: 220px; background: var(--surface); }
        .search-form button {
            background: var(--brand);
            color: white;
            cursor: pointer;
            border-color: var(--brand);
        }
        .search-form button:hover { background: var(--brand-dark); }
        main { padding: 2rem 0 4rem; }
        .hero {
            padding: 3rem;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: linear-gradient(135deg, #fff7ea 0%, #fff 100%);
            box-shadow: 0 18px 45px rgba(154, 52, 18, 0.08);
        }
        .hero h1 {
            margin: 0 0 1rem;
            font-size: clamp(2.2rem, 5vw, 4.4rem);
            line-height: 0.95;
            color: var(--brand-dark);
        }
        .hero p {
            max-width: 680px;
            color: var(--muted);
            font-size: 1.05rem;
        }
        .hero-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
        .button {
            display: inline-block;
            padding: 0.9rem 1.2rem;
            border-radius: 999px;
            border: 1px solid var(--brand);
        }
        .button.primary {
            background: var(--brand);
            color: white;
        }
        .button.secondary {
            background: transparent;
            color: var(--brand-dark);
        }
        .section-head {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: end;
            margin: 2.5rem 0 1rem;
        }
        .section-head h2 { margin: 0; font-size: 1.8rem; }
        .section-head p { margin: 0; color: var(--muted); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(31, 41, 55, 0.05);
        }
        .card-image {
            aspect-ratio: 4 / 3;
            background: linear-gradient(135deg, #ffe5b0, #fff8ea);
            display: grid;
            place-items: center;
            color: var(--brand-dark);
            font-size: 1.1rem;
            padding: 1rem;
            text-align: center;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-body {
            padding: 1rem;
        }
        .badge {
            display: inline-block;
            padding: 0.3rem 0.6rem;
            border-radius: 999px;
            background: #ffedd5;
            color: var(--brand-dark);
            font-size: 0.82rem;
            margin-bottom: 0.7rem;
        }
        .price-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 0.8rem;
        }
        .price {
            font-weight: 700;
            font-size: 1.15rem;
        }
        .price-old {
            color: var(--muted);
            text-decoration: line-through;
        }
        .stock {
            color: var(--success);
            font-size: 0.95rem;
        }
        .layout {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 1.5rem;
        }
        .sidebar, .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 1.2rem;
        }
        .category-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 0.6rem;
        }
        .category-list a {
            display: block;
            padding: 0.75rem 0.9rem;
            border-radius: 16px;
            background: #fff9ef;
        }
        .category-list a.active,
        .category-list a:hover {
            background: var(--surface-alt);
        }
        .detail {
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
            gap: 1.5rem;
        }
        .detail-image {
            min-height: 360px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--line);
            background: linear-gradient(135deg, #ffe5b0, #fff8ea);
            display: grid;
            place-items: center;
        }
        .detail-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .empty {
            padding: 1rem;
            border-radius: 18px;
            background: #fff9ef;
            color: var(--muted);
        }
        .site-footer {
            border-top: 1px solid var(--line);
            padding: 1.5rem 0 3rem;
            color: var(--muted);
        }
        @media (max-width: 820px) {
            .layout, .detail { grid-template-columns: 1fr; }
            .hero { padding: 2rem; }
            .header-inner { align-items: start; flex-direction: column; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="{% url 'store:home' %}" class="brand">Flipzon</a>
            <nav class="nav">
                <a href="{% url 'store:home' %}">Home</a>
                <a href="{% url 'store:product_list' %}">Products</a>
                <a href="/admin/">Admin</a>
            </nav>
            <form class="search-form" action="{% url 'store:product_list' %}" method="get">
                <input type="search" name="q" placeholder="Search products..." value="{{ request.GET.q }}">
                <button type="submit">Search</button>
            </form>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">Flipzon storefront built with Django.</div>
    </footer>
</body>
</html>
