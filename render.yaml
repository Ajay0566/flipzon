services:
  - type: web
    name: flipzon
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn flipzon.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "flipzon.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://flipzon.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: flipzon-db
          property: connectionString

databases:
  - name: flipzon-db
    plan: free
